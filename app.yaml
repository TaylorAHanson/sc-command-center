command:
  - uvicorn
  - server.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
  - --proxy-headers
  - --forwarded-allow-ips
  - "*"
  # Run multiple worker processes so one slow/blocking request can't stall the
  # whole app. Each worker is an independent event loop + thread pool. App state
  # lives in Postgres/Lakebase (not in-process), so workers are safe to scale.
  # Tune up if the app container has more CPU/memory headroom.
  - --workers
  - "2"
env:
  - name: PYTHONPATH
    value: .:server
  - name: SQL_WAREHOUSE_ID
    value: "14b25bcc9c131636"
  - name: N8N_BASE_URL
    value: ""  # Optional: Set your N8N instance URL, e.g. https://your-n8n.com
  - name: TABLEAU_SERVER_URL
    value: ""  # Set your Tableau Cloud URL, e.g. https://10ax.online.tableau.com
  - name: USE_SP_FOR_JOBS
    value: "true"  # Set to "true" to use Service Principal for job/notebook execution
  - name: LAKEBASE_ENABLED
    value: "true"
  - name: LAKEBASE_INSTANCE_NAME
    value: "command-center"
  - name: CONSOLIDATED_AGENT_URL
    value: ""  # URL of the consolidated Self-Service agent runtime app, e.g. https://self-service-1234567890.<region>.databricksapps.com
  - name: AGENT_BASE_URL
    value: ""  # Deprecated fallback for CONSOLIDATED_AGENT_URL (legacy standalone agent app URL)
  - name: AGENT_STUDIO_PROMOTION_TARGETS
    value: ""  # Optional: pinned Agent Studio promotion targets, e.g. "Prod=/Volumes/main/agents/prod/.agents,Staging=/Volumes/main/agents/staging/.agents". If empty, the user's writable shared volumes are offered.
  - name: AGENT_STUDIO_PROFILE_LOCATIONS
    value: ""  # Optional: pinned shared ".agents" dirs to list INSTEAD of crawling the metastore, e.g. "/Volumes/main/agents/shared/.agents,/Volumes/main/agents/prod/.agents". Strongly recommended in production — turns an O(catalogs×schemas×volumes) scan into a few directory listings. If empty, falls back to the bounded crawl.
  - name: AGENT_STUDIO_MAX_VERSIONS
    value: ""  # Optional: how many AGENT.md history snapshots to keep per profile under ".versions" (default 20; "0" disables versioning).
