bundle:
  name: sc-command-center
  # Require minimum CLI version for Databricks Apps with app.config support
  databricks_cli_version: ">=0.283.0"

# Resources
resources:
  
  database_instances:
    command_center_db:
      name: "command-center-${var.environment}-v1"
      enable_pg_native_login: true
      capacity: "CU_1"
      lifecycle:
        prevent_destroy: true
      permissions:
        # Authoritative ACL: must re-grant the deploying user CAN_MANAGE,
        # otherwise applying this block strips the creator's manage rights and
        # the app's `postgres` resource attach later fails with
        # "User needs MANAGE permission on the resource".
        - level: CAN_MANAGE
          user_name: "${workspace.current_user.userName}"
        # The app's auto-created service principal needs access to the instance.
        # The database_instance ACL only supports CAN_MANAGE / CAN_USE — the
        # Postgres-level CONNECT+CREATE role grant is a separate plane handled by
        # the app's `postgres:` resource (permission: CAN_CONNECT_AND_CREATE
        # below). Listing the SP here as CAN_USE keeps its instance access from
        # being stripped on the next apply (this ACL is authoritative). No
        # dependency cycle: the inline permissions compile to a separate
        # databricks_permissions resource applied after the instance and app exist.
        - level: CAN_USE
          service_principal_name: ${resources.apps.sc-command-center.service_principal_client_id}
        - level: CAN_USE
          group_name: "users"

  # Apps
  apps:
    sc-command-center:
      name: ${var.app_name}
      description: "sc-command-center - Command Center for ${var.environment}"
      source_code_path: "${var.source_code_path}"
      resources:
        # Attach the Lakebase database as an AUTOSCALING resource (`postgres:`),
        # not the Provisioned `database:` type. Since Mar 12 2026 every instance
        # created via `database_instances` is an Autoscaling *project*; attaching
        # it with the Provisioned `database:` block makes the platform validate
        # MANAGE against a provisioned-instance securable that doesn't match the
        # project ACL you actually hold -> "User needs MANAGE permission on the
        # resource", even when you have Can Manage on the project.
        #
        # Autoscaling path facts (from `databricks postgres list-branches/-databases`):
        #   - project name  == the database instance name (command-center-<env>-v1)
        #   - default branch == "production" (auto-created, not the instance name)
        #   - database id    == "databricks-postgres" (hyphen; the logical PG db
        #                        is "databricks_postgres" with an underscore)
        - name: postgres
          postgres:
            branch: projects/${resources.database_instances.command_center_db.name}/branches/production
            database: projects/${resources.database_instances.command_center_db.name}/branches/production/databases/databricks-postgres
            permission: CAN_CONNECT_AND_CREATE
      config:
        command:
          - uvicorn
          - server.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
          - --proxy-headers
          - --forwarded-allow-ips
          - "*"
          # Run multiple worker processes so one slow/blocking request can't stall
          # the whole app. Each worker is an independent event loop + thread pool.
          # State lives in Postgres/Lakebase (not in-process), so workers are safe
          # to scale. Tune up if the app container has more CPU/memory headroom.
          - --workers
          - "2"
        env:
          - name: PYTHONPATH
            value: ".:server"
          - name: SQL_WAREHOUSE_ID
            value: "${var.sql_warehouse_id}"
          - name: USE_SP_FOR_JOBS
            value: "${var.use_sp_for_jobs}"
          - name: LAKEBASE_ENABLED
            value: "${var.lakebase_enabled}"
          - name: LAKEBASE_INSTANCE_NAME
            value: "${resources.database_instances.command_center_db.name}"
          # ── Optional env (omitted when blank) ──────────────────────────────────
          # Databricks Apps rejects an env entry whose value renders empty
          # ("Must specify ... value or valueFrom"), so the vars below stay
          # commented while their defaults are blank. The app code already defaults
          # each of these to "" / a local fallback, so leaving them out is
          # equivalent. To enable one, set the corresponding var (in `variables:`
          # or a target's `variables:`) and uncomment its entry here.
          #
          # - name: N8N_BASE_URL
          #   value: "${var.n8n_base_url}"
          # - name: TABLEAU_SERVER_URL
          #   value: "${var.tableau_server_url}"
          #
          # Agent integration (consolidated from the former app.yaml):
          # CONSOLIDATED_AGENT_URL — URL of the consolidated Self-Service agent
          #   runtime app, e.g. https://self-service-1234567890.<region>.databricksapps.com
          # - name: CONSOLIDATED_AGENT_URL
          #   value: "${var.consolidated_agent_url}"
          # AGENT_BASE_URL — deprecated fallback for CONSOLIDATED_AGENT_URL
          #   (legacy standalone agent app URL).
          # - name: AGENT_BASE_URL
          #   value: "${var.agent_base_url}"
          # AGENT_STUDIO_PROMOTION_TARGETS — pinned promotion targets, e.g.
          #   "Prod=/Volumes/main/agents/prod/.agents,Staging=/Volumes/main/agents/staging/.agents".
          #   Empty = offer the user's writable shared volumes.
          # - name: AGENT_STUDIO_PROMOTION_TARGETS
          #   value: "${var.agent_studio_promotion_targets}"
          # AGENT_STUDIO_PROFILE_LOCATIONS — pinned shared ".agents" dirs to list
          #   INSTEAD of crawling the metastore. Strongly recommended in production —
          #   turns an O(catalogs×schemas×volumes) scan into a few directory listings.
          #   Empty = bounded crawl.
          # - name: AGENT_STUDIO_PROFILE_LOCATIONS
          #   value: "${var.agent_studio_profile_locations}"
          # AGENT_STUDIO_MAX_VERSIONS — how many AGENT.md history snapshots to keep
          #   per profile under ".versions" (default 20; "0" disables versioning).
          # - name: AGENT_STUDIO_MAX_VERSIONS
          #   value: "${var.agent_studio_max_versions}"

      user_api_scopes:
        - "sql"
        - "sql.statement-execution"
        - "sql.warehouses"
        - "files.files"
        # Forwarded to the EDH agent (OBO) so it can run Genie, the managed-MCP SQL/Genie
        # servers, and the LLM as the signed-in user. Without these the agent's Genie/MCP/LLM
        # calls fail under OBO when driven through Command Center. Mirrors the agent's own scopes.
        - "genie"
        - "mcp.functions"
        - "mcp.external"
        - "model-serving"
        - "ai-gateway"

      permissions:
        - level: CAN_MANAGE
          user_name: "${workspace.current_user.userName}"
        - level: CAN_USE
          group_name: "users"

# Sync configuration
sync:
  include:
    - package.json
    - vite.config.ts
    - tsconfig.json
    - tsconfig.app.json
    - tsconfig.node.json
    - tailwind.config.js
    - postcss.config.js
    - eslint.config.js
    - index.html
    - requirements.txt
    - src/**
    - public/**
    # Include all backend code
    - server/**
  exclude:
    # Python cache and compiled files
    - __pycache__/**
    - server/__pycache__/**
    - server/**/__pycache__/**
    - server/**/*.pyc
    - server/**/*.pyo
    # Virtual environment
    - venv/**
    - .venv/**
    # Environment and config files
    - .env
    - .env.*
    - server/.env
    - server/.env.*
    # Database files
    - server/*.db
    # IDE and OS files
    - .DS_Store
    - "**/.DS_Store"
    # Test and cache directories
    - .pytest_cache/**
    - .mypy_cache/**
    - server/.pytest_cache/**
    - server/.mypy_cache/**
    # Build artifacts
    - "*.egg-info/**"
    - server/*.egg-info/**
    - dist/**
    - build/**
    - server/dist/**
    - server/build/**
    # Logs
    - "*.log"
    - server/*.log
    - backend.log
    - frontend.log
    # Git files
    - .git/**
    - server/.git/**
    - .gitignore
    - server/.gitignore
    - .databricksignore
    # Node
    - node_modules/**

# Variables
variables:
  dev_user:
    description: "Developer username for personal dev instances"
    default: "taylor"
  app_name:
    description: "Application name"
    default: "sc-command-center"
  environment:
    description: "Environment name (local, dev, stage, prod)"
    default: "local"
  source_code_path:
    description: "Path to source code in workspace"
    default: "."
  sql_warehouse_id:
    description: "Databricks SQL Warehouse ID"
  n8n_base_url:
    description: "N8N base URL"
    default: ""
  tableau_server_url:
    description: "Tableau server URL"
    default: ""
  use_sp_for_jobs:
    description: "Use Service Principal for job execution"
    default: "true"
  lakebase_enabled:
    description: "Lakebase Enabled"
    default: "true"
  consolidated_agent_url:
    description: "URL of the consolidated Self-Service agent runtime app"
    default: ""
  agent_base_url:
    description: "Deprecated fallback for consolidated_agent_url (legacy standalone agent app URL)"
    default: ""
  agent_studio_promotion_targets:
    description: "Pinned Agent Studio promotion targets (label=path, comma-separated). Empty = offer the user's writable shared volumes."
    default: ""
  agent_studio_profile_locations:
    description: "Pinned shared '.agents' dirs to list instead of crawling the metastore (comma-separated). Empty = bounded crawl."
    default: ""
  agent_studio_max_versions:
    description: "AGENT.md history snapshots to keep per profile (default 20; 0 disables versioning)."
    default: ""

# Target environments
targets:

  local:
    mode: development
    default: true
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "local"
        Environment: "local"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-local-${var.dev_user}"
      environment: "local"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"

  enterprise-dev:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "dev"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-dev"
      environment: "dev"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"

  supply-dev:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "dev"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-dev"
      environment: "dev"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"

  # Staging environment
  stage:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "stage"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-stage"
      environment: "stage"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"

  # Production environment
  prod:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "prod"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-prod"
      environment: "prod"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"