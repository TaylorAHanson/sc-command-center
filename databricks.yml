bundle:
  name: sc-command-center
  # Require minimum CLI version for Databricks Apps with app.config support
  databricks_cli_version: ">=0.283.0"

# Resources
resources:
  
  database_instances:
    command_center_db:
      name: "command-center-${var.environment}-v1"
      enable_pg_native_login: true
      capacity: "CU_1"
      lifecycle:
        prevent_destroy: true
      permissions:
        # Authoritative ACL: must re-grant the deploying user CAN_MANAGE,
        # otherwise applying this block strips the creator's manage rights and
        # the app's `postgres` resource attach later fails with
        # "User needs MANAGE permission on the resource".
        - level: CAN_MANAGE
          user_name: "${workspace.current_user.userName}"
        # The app's auto-created service principal needs access to the instance.
        # The database_instance ACL only supports CAN_MANAGE / CAN_USE — the
        # Postgres-level CONNECT+CREATE role grant is a separate plane handled by
        # the app's `postgres:` resource (permission: CAN_CONNECT_AND_CREATE
        # below). Listing the SP here as CAN_USE keeps its instance access from
        # being stripped on the next apply (this ACL is authoritative). No
        # dependency cycle: the inline permissions compile to a separate
        # databricks_permissions resource applied after the instance and app exist.
        - level: CAN_USE
          service_principal_name: ${resources.apps.sc-command-center.service_principal_client_id}
        - level: CAN_USE
          group_name: "users"

  # Apps
  apps:
    sc-command-center:
      name: ${var.app_name}
      description: "sc-command-center - Command Center for ${var.environment}"
      source_code_path: "${var.source_code_path}"
      resources:
        # Attach the Lakebase database as an AUTOSCALING resource (`postgres:`),
        # not the Provisioned `database:` type. Since Mar 12 2026 every instance
        # created via `database_instances` is an Autoscaling *project*; attaching
        # it with the Provisioned `database:` block makes the platform validate
        # MANAGE against a provisioned-instance securable that doesn't match the
        # project ACL you actually hold -> "User needs MANAGE permission on the
        # resource", even when you have Can Manage on the project.
        #
        # Autoscaling path facts (from `databricks postgres list-branches/-databases`):
        #   - project name  == the database instance name (command-center-<env>-v1)
        #   - default branch == "production" (auto-created, not the instance name)
        #   - database id    == "databricks-postgres" (hyphen; the logical PG db
        #                        is "databricks_postgres" with an underscore)
        - name: postgres
          postgres:
            branch: projects/${resources.database_instances.command_center_db.name}/branches/production
            database: projects/${resources.database_instances.command_center_db.name}/branches/production/databases/databricks-postgres
            permission: CAN_CONNECT_AND_CREATE
      config:
        command:
          - uvicorn
          - server.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
          - --proxy-headers
          - --forwarded-allow-ips
          - "*"
          # Run multiple worker processes so one slow/blocking request can't stall
          # the whole app. Each worker is an independent event loop + thread pool.
          # State lives in Postgres/Lakebase (not in-process), so workers are safe
          # to scale. Tune up if the app container has more CPU/memory headroom.
          - --workers
          - "2"
        env:
          - name: PYTHONPATH
            value: ".:server"
          - name: SQL_WAREHOUSE_ID
            value: "${var.sql_warehouse_id}"
          - name: USE_SP_FOR_JOBS
            value: "${var.use_sp_for_jobs}"
          - name: LAKEBASE_ENABLED
            value: "${var.lakebase_enabled}"
          - name: LAKEBASE_INSTANCE_NAME
            value: "${resources.database_instances.command_center_db.name}"
          # ⚠️ TEMPORARY demo kill-switch — when "true", ALL role/permission checks
          # are bypassed and every signed-in user is treated as a global admin.
          # REVERT TO "false" (or remove) AFTER THE DEMO. See var.disable_permission_checks.
          - name: DISABLE_PERMISSION_CHECKS
            value: "${var.disable_permission_checks}"
          # ── Optional env (omitted when blank) ──────────────────────────────────
          # Databricks Apps rejects an env entry whose value renders empty
          # ("Must specify ... value or valueFrom"), so the vars below stay
          # commented while their defaults are blank. The app code already defaults
          # each of these to "" / a local fallback, so leaving them out is
          # equivalent. To enable one, set the corresponding var (in `variables:`
          # or a target's `variables:`) and uncomment its entry here.
          #
          # - name: N8N_BASE_URL
          #   value: "${var.n8n_base_url}"
          # - name: TABLEAU_SERVER_URL
          #   value: "${var.tableau_server_url}"
          #
          # Agent integration (consolidated from the former app.yaml):
          # CONSOLIDATED_AGENT_URL — URL of the consolidated Self-Service agent
          #   runtime app (the edh-ssc / qc-selfservice-v3 Databricks App). The
          #   Command Center proxies all /api/v1/agent calls here. MUST be set, or
          #   the proxy falls back to http://localhost:8000 (itself) and every
          #   agent request 405s.
          - name: CONSOLIDATED_AGENT_URL
            value: "${var.consolidated_agent_url}"
          # AGENT_BASE_URL — deprecated fallback for CONSOLIDATED_AGENT_URL
          #   (legacy standalone agent app URL).
          # - name: AGENT_BASE_URL
          #   value: "${var.agent_base_url}"
          # AGENT_STUDIO_PROMOTION_TARGETS — pinned promotion targets, e.g.
          #   "Prod=/Volumes/main/agents/prod/.agents,Staging=/Volumes/main/agents/staging/.agents".
          #   Empty = offer the user's writable shared volumes.
          # - name: AGENT_STUDIO_PROMOTION_TARGETS
          #   value: "${var.agent_studio_promotion_targets}"
          # AGENT_STUDIO_PROFILE_LOCATIONS — pinned shared ".agents" dirs to list
          #   INSTEAD of crawling the metastore. Strongly recommended in production —
          #   turns an O(catalogs×schemas×volumes) scan into a few directory listings.
          #   Empty = bounded crawl.
          # - name: AGENT_STUDIO_PROFILE_LOCATIONS
          #   value: "${var.agent_studio_profile_locations}"
          # AGENT_STUDIO_MAX_VERSIONS — how many AGENT.md history snapshots to keep
          #   per profile under ".versions" (default 20; "0" disables versioning).
          # - name: AGENT_STUDIO_MAX_VERSIONS
          #   value: "${var.agent_studio_max_versions}"
          # AGENT_INJECT_HOUSE_STYLE — when true (default), the proxy appends global
          #   output rules (currently: NO emojis) to every agent turn — saved
          #   profiles, Agent Studio "Try it" drafts, and the default agent. Set to
          #   "false" to let individual profiles control formatting entirely.
          - name: AGENT_INJECT_HOUSE_STYLE
            value: "true"
          # AGENT_STUDIO_LLM_MODEL — model the Agent Studio authoring assistant
          #   uses to DRAFT profiles (not the runtime agent). With the AI Gateway
          #   base path (below) this is the UC model name, e.g.
          #   "system.ai.claude-opus-4-8" (governed, non-deprecated). With the
          #   default "/serving-endpoints" path it's a serving-endpoint name, e.g.
          #   "databricks-claude-sonnet-4-6".
          - name: AGENT_STUDIO_LLM_MODEL
            value: "${var.agent_studio_llm_model}"
          # AGENT_STUDIO_LLM_BASE_PATH — OpenAI-compatible base path for the
          #   authoring LLM, joined to the workspace host. Use
          #   "/ai-gateway/mlflow/v1" for the UC-governed AI Gateway (addresses
          #   models like "system.ai.*"); or "/serving-endpoints" for workspace
          #   serving-endpoint names. langchain appends "/chat/completions".
          - name: AGENT_STUDIO_LLM_BASE_PATH
            value: "${var.agent_studio_llm_base_path}"
          # AGENT_STUDIO_MAX_TOKENS — output budget for the authoring draft. Too
          #   small truncates the JSON profile mid-string ("draft JSON found but
          #   failed to parse"). Multi-skill agents need a generous cap.
          - name: AGENT_STUDIO_MAX_TOKENS
            value: "${var.agent_studio_max_tokens}"
          # AGENT_STUDIO_MCP_SERVERS — comma-separated AI Gateway MCP servers the
          #   authoring assistant introspects for available tools. Entries are
          #   workspace-relative paths (joined to the host) or absolute URLs. Add
          #   resource-scoped servers to expose more tools, e.g.
          #   "/api/2.0/mcp/functions/<catalog>/<schema>" (UC functions) or
          #   "/api/2.0/mcp/genie/<genie_space_id>" (a specific Genie space).
          - name: AGENT_STUDIO_MCP_SERVERS
            value: "${var.agent_studio_mcp_servers}"

      user_api_scopes:
        - "sql"
        - "sql.statement-execution"
        - "sql.warehouses"
        - "files.files"
        # Workspace API (import/export/mkdirs). Required for OBO PERSONAL agent
        # profiles/skills, which live under /Workspace/Users/<user>/.agents.
        # Without this the user's forwarded token is downscoped and saving a
        # personal agent fails with "OAuth token does not have required scopes:
        # workspace". (files.files only covers UC Volumes via the Files API.)
        - "workspace.workspace"
        # Forwarded to the EDH agent (OBO) so it can run Genie, the managed-MCP SQL/Genie
        # servers, and the LLM as the signed-in user. Without these the agent's Genie/MCP/LLM
        # calls fail under OBO when driven through Command Center. Mirrors the agent's own scopes.
        - "genie"
        - "mcp.functions"
        - "mcp.external"
        - "model-serving"
        - "ai-gateway"

      permissions:
        - level: CAN_MANAGE
          user_name: "${workspace.current_user.userName}"
        - level: CAN_USE
          group_name: "users"

# Sync configuration
sync:
  include:
    - package.json
    - vite.config.ts
    - tsconfig.json
    - tsconfig.app.json
    - tsconfig.node.json
    - tailwind.config.js
    - postcss.config.js
    - eslint.config.js
    - index.html
    - requirements.txt
    - src/**
    - public/**
    # Include all backend code
    - server/**
  exclude:
    # Python cache and compiled files
    - __pycache__/**
    - server/__pycache__/**
    - server/**/__pycache__/**
    - server/**/*.pyc
    - server/**/*.pyo
    # Virtual environment
    - venv/**
    - .venv/**
    # Environment and config files
    - .env
    - .env.*
    - server/.env
    - server/.env.*
    # Database files
    - server/*.db
    # IDE and OS files
    - .DS_Store
    - "**/.DS_Store"
    # Test and cache directories
    - .pytest_cache/**
    - .mypy_cache/**
    - server/.pytest_cache/**
    - server/.mypy_cache/**
    # Build artifacts
    - "*.egg-info/**"
    - server/*.egg-info/**
    - dist/**
    - build/**
    - server/dist/**
    - server/build/**
    # Logs
    - "*.log"
    - server/*.log
    - backend.log
    - frontend.log
    # Git files
    - .git/**
    - server/.git/**
    - .gitignore
    - server/.gitignore
    - .databricksignore
    # Node
    - node_modules/**

# Variables
variables:
  dev_user:
    description: "Developer username for personal dev instances"
    default: "taylor"
  app_name:
    description: "Application name"
    default: "sc-command-center"
  environment:
    description: "Environment name (local, dev, stage, prod)"
    default: "local"
  source_code_path:
    description: "Path to source code in workspace"
    default: "."
  sql_warehouse_id:
    description: "Databricks SQL Warehouse ID"
  n8n_base_url:
    description: "N8N base URL"
    default: ""
  tableau_server_url:
    description: "Tableau server URL"
    default: ""
  use_sp_for_jobs:
    description: "Use Service Principal for job execution"
    default: "true"
  lakebase_enabled:
    description: "Lakebase Enabled"
    default: "true"
  disable_permission_checks:
    description: "⚠️ TEMPORARY: when 'true', bypass ALL role/permission checks (everyone is a global admin). Revert to 'false' after the demo."
    default: "true"
  consolidated_agent_url:
    description: "URL of the consolidated Self-Service agent runtime app (edh-ssc). The Command Center proxies /api/v1/agent calls here. Override per-target for stage/prod."
    default: "https://edh-ssc-dev-todo.aws.databricksapps.com"
  agent_base_url:
    description: "Deprecated fallback for consolidated_agent_url (legacy standalone agent app URL)"
    default: ""
  agent_studio_promotion_targets:
    description: "Pinned Agent Studio promotion targets (label=path, comma-separated). Empty = offer the user's writable shared volumes."
    default: ""
  agent_studio_profile_locations:
    description: "Pinned shared '.agents' dirs to list instead of crawling the metastore (comma-separated). Empty = bounded crawl."
    default: ""
  agent_studio_max_versions:
    description: "AGENT.md history snapshots to keep per profile (default 20; 0 disables versioning)."
    default: ""
  agent_studio_llm_model:
    description: "Model the Agent Studio authoring assistant uses to draft profiles. With the AI Gateway base path this is a UC model name (e.g. system.ai.claude-opus-4-8, governed/non-deprecated); with /serving-endpoints it's a serving-endpoint name."
    default: "system.ai.claude-opus-4-8"
  agent_studio_llm_base_path:
    description: "OpenAI-compatible base path for the authoring LLM (joined to the workspace host). '/ai-gateway/mlflow/v1' = UC-governed AI Gateway (system.ai.* names); '/serving-endpoints' = workspace serving-endpoint names."
    default: "/ai-gateway/mlflow/v1"
  agent_studio_mcp_servers:
    description: "Comma-separated AI Gateway MCP servers the authoring assistant introspects for tools (workspace-relative paths or absolute URLs). Add '/api/2.0/mcp/functions/<catalog>/<schema>' for UC functions or '/api/2.0/mcp/genie/<genie_space_id>' for a specific Genie space."
    default: "/api/2.0/mcp/sql,/api/2.0/mcp/genie"
  agent_studio_max_tokens:
    description: "Output token budget for the Agent Studio authoring draft. Too low truncates the JSON profile and it fails to parse."
    default: "16000"

# Target environments
targets:

  local:
    mode: development
    default: true
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "local"
        Environment: "local"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-local-${var.dev_user}"
      environment: "local"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"
    resources:
      apps:
        sc-command-center:
          # Dev-only: "Anyone in my organization can use" (grants the
          # `All account users` group CAN_USE). Appended to the base app
          # permissions; stage/prod stay restricted to explicit grants.
          permissions:
            - level: CAN_USE
              group_name: "account users"

  enterprise-dev:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "dev"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-dev"
      environment: "dev"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"
    resources:
      apps:
        sc-command-center:
          # Dev-only: "Anyone in my organization can use" (grants the
          # `All account users` group CAN_USE). Appended to the base app
          # permissions; stage/prod stay restricted to explicit grants.
          permissions:
            - level: CAN_USE
              group_name: "account users"

  supply-dev:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "dev"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-dev"
      environment: "dev"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"
    resources:
      apps:
        sc-command-center:
          # Dev-only: "Anyone in my organization can use" (grants the
          # `All account users` group CAN_USE). Appended to the base app
          # permissions; stage/prod stay restricted to explicit grants.
          permissions:
            - level: CAN_USE
              group_name: "account users"

  # Staging environment
  stage:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "stage"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-stage"
      environment: "stage"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"

  # Production environment
  prod:
    mode: production
    presets:
      tags:
        version: "VERSION_TAG"
        Repo_name: "${bundle.name}"
        deployed_via: "CICD"
        Environment: "prod"
        Application: "sc-command-center"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: "sc-command-center-prod"
      environment: "prod"
      source_code_path: "."
      sql_warehouse_id:
        lookup:
          warehouse: "Serverless Starter Warehouse"